name: 每日自动签到

on:
  schedule:
    # GitHub Actions cron 使用 UTC。
    # 避开整点高峰：北京时间 08:17 执行一次，09:37 补跑一次。
    # 如果第一次已经签到，第二次会通过状态接口确认后安全退出。
    - cron: '17 0 * * *'
    - cron: '37 1 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 签到站点1 (ai.xem8k5.top)
        env:
          CHECKIN_USERNAME: ${{ secrets.CHECKIN_USERNAME }}
          CHECKIN_PASSWORD: ${{ secrets.CHECKIN_PASSWORD }}
        run: bash checkin.sh

      - name: 签到站点2 (api.denxio.top)
        if: always()
        env:
          CHECKIN_USERNAME2: ${{ secrets.CHECKIN_USERNAME2 }}
          CHECKIN_PASSWORD2: ${{ secrets.CHECKIN_PASSWORD2 }}
        run: bash checkin2.sh

      - name: 签到站点3 (mx.236600.xyz)
        if: always()
        env:
          CHECKIN_USERNAME3: ${{ secrets.CHECKIN_USERNAME3 }}
          CHECKIN_PASSWORD3: ${{ secrets.CHECKIN_PASSWORD3 }}
        run: bash checkin3.sh
