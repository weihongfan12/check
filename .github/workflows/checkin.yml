name: 每日自动签到

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 运行签到脚本
        env:
          CHECKIN_USERNAME: ${{ secrets.CHECKIN_USERNAME }}
          CHECKIN_PASSWORD: ${{ secrets.CHECKIN_PASSWORD }}
        run: bash checkin.sh
